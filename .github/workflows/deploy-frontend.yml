name: Deploy Frontend to Azure Static Web Apps

# Triggers
on:
  push:
    branches:
      - main        # deploy on every push to main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main        # preview deployment on every PR

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular App

    steps:

      # Step 1: Get the code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # Step 2: Set up Node.js (matches your local version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'        # caches node_modules between runs — faster builds

      # Step 3: Install dependencies
      # 'ci' is stricter than 'install' — uses exact versions from package-lock.json
      - name: Install dependencies
        run: npm ci

      # Step 4: Build Angular for production
      # --configuration production triggers fileReplacements in angular.json
      # environment.ts is swapped with environment.prod.ts
      # Result: /api/auth, /api/offer, /api/booking baked into the bundle
      - name: Build Angular (production)
        run: npm run build -- --configuration production

      # Step 5: Deploy to Azure Static Web Apps
      # This action handles upload to Azure CDN, SSL cert, routing config
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # Where your built Angular files are
          app_location: "/"              # source code root
          output_location: "dist/optimumpool-ui/browser"  # ng build output

          skip_app_build: true

          # staticwebapp.config.json is picked up automatically from src/
          config_file_location: "src/"
