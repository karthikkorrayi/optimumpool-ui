name: Build and Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: optimumpoolacr
  ACR_LOGIN_SERVER: optimumpoolacr.azurecr.io
  APP_SERVICE_NAME: optimumpool-ui
  RESOURCE_GROUP: dev-environment-rg
  IMAGE_NAME: optimumpoolacr.azurecr.io/frontend

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build Docker Image and Deploy

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          echo "Built image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"

      - name: Push image to ACR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Pushed to ACR successfully"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.IMAGE_NAME }}:${{ github.run_number }}

          # Restart to pull new image immediately
          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

          echo "Deployed image: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          echo "App URL: https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net"