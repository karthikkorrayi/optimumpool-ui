# OptimumPool Frontend — Nginx Configuration
# Serves Angular SPA and proxies API calls to ACI backend
# This file is copied into the Docker image

server {
    listen 80;
    server_name _;

    # Angular build output
    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy Rules ────────────────────────────────────────────────
    # Nginx proxies ALL HTTP methods (GET, POST, PUT, DELETE, OPTIONS)
    # This is why we use Nginx instead of Static Web Apps rewrites
    # which only support GET

    location /api/auth/ {
        # Strip /api/auth prefix, forward remainder to Auth service
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://optimumpool-app.southindia.azurecontainer.io:8020;

        # Required proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — Spring Boot can take a moment to respond
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;

        # Allow CORS preflight from App Service domain
        # OPTIONS requests must be proxied too, not blocked
        proxy_method $request_method;
    }

    location /api/offer/ {
        rewrite ^/api/offer/(.*)$ /$1 break;
        proxy_pass http://optimumpool-app.southindia.azurecontainer.io:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    location /api/booking/ {
        rewrite ^/api/booking/(.*)$ /$1 break;
        proxy_pass http://optimumpool-app.southindia.azurecontainer.io:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # ── Angular SPA Routing ────────────────────────────────────────────
    # All non-API routes serve index.html
    # Angular's router handles the rest client-side
    # Without this, refreshing /customer/search returns 404

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ───────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}