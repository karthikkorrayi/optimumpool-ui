server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Azure DNS resolver — required for dynamic hostname resolution
    # Without this, Nginx resolves the hostname once at startup and caches it
    # With this, Nginx re-resolves on each upstream connection
    resolver 168.63.129.16 valid=30s ipv6=off;

    # Set upstream variables — Nginx resolves these using the resolver above
    # Using variables forces Nginx to re-resolve DNS instead of caching at startup
    set $auth_upstream    "optimumpool-app.southindia.azurecontainer.io";
    set $offer_upstream   "optimumpool-app.southindia.azurecontainer.io";
    set $booking_upstream "optimumpool-app.southindia.azurecontainer.io";

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://$auth_upstream:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    location /api/offer/ {
        rewrite ^/api/offer/(.*)$ /$1 break;
        proxy_pass http://$offer_upstream:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    location /api/booking/ {
        rewrite ^/api/booking/(.*)$ /$1 break;
        proxy_pass http://$booking_upstream:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
}
