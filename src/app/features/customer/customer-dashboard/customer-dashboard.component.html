<div class="dashboard">
  <div class="dashboard-header">
    <div>
      <h1>Customer Dashboard</h1>
      <p *ngIf="profile" class="subtitle">
        Welcome, <strong>{{ profile.username }}</strong> · 📞 {{ profile.phone }}
      </p>
    </div>
    <button class="btn-outline" (click)="authService.logout()">Logout</button>
  </div>

  <div class="card-grid">
    <a routerLink="/customer/search" class="menu-card">
      <div class="menu-icon">🔍</div>
      <h3>Search Rides</h3>
      <p>Find available rides by route and book a seat</p>
    </a>

    <a routerLink="/customer/my-bookings" class="menu-card">
      <div class="menu-icon">📌</div>
      <h3>My Bookings</h3>
      <p>Track your bookings, generate invoices and pay</p>
    </a>
  </div>
</div>
