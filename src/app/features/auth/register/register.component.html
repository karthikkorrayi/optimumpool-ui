<div class="page-center">
  <div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Join OptimumPool</p>

    <div *ngIf="error"   class="alert error">{{ error }}</div>
    <div *ngIf="success" class="alert success">{{ success }}</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Choose a password" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="number" [(ngModel)]="phone" placeholder="10-digit mobile number" />
    </div>

    <div class="form-group">
      <label>I am a</label>
      <select [(ngModel)]="role">
        <option value="CUSTOMER">Customer — I want to book rides</option>
        <option value="OWNER">Car Owner — I want to offer rides</option>
      </select>
    </div>

    <button class="btn-primary" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="link-text">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
